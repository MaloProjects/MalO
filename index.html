<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MalO ver 1.0.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        @media screen and (orientation: landscape) {
            body {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }
    </style>
</head>
<body>

    <div>test</div>

    <script>
        function lockPortrait() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait')
                    .then(() => {
                        console.log("Hardware orientation locked to portrait.");
                    })
                    .catch((error) => {
                        console.log("Hardware lock blocked by browser. Using CSS fallback instead.");
                    });
            }
        }

        window.addEventListener("DOMContentLoaded", lockPortrait);

        window.addEventListener("click", lockPortrait);
    </script>
</body>
</html>
